appId: dev.veilbrowse.desktop
copyright: Copyright © 2026
productName: VeilBrowse

# Only build Linux target
directories:
  output: dist
  buildResources: build

files:
  - "electron-main.js"
  - "server/**/*"
  - "public/**/*"
  - "data/.gitkeep"
  - "scripts/**/*"
  - "!scripts/postinstall.js"
  - "!**/*.db"
  - "!**/*.db-shm"
  - "!**/*.db-wal"
  - "!data/profiles/**/*"
  - "node_modules/**/*"
  - "package.json"

asar: true
asarUnpack:
  - "node_modules/sqlite3/**/*.node"
  - "node_modules/playwright/**/*.node"

linux:
  target:
    - AppImage
  category: Network
  maintainer: veilbrowse
  vendor: veilbrowse
  synopsis: Anti-detect browser manager for Linux
  description: Manage isolated Chrome profiles with fingerprint randomization, proxy pools, and anti-detection scripting.
  executableName: veilbrowse

appImage:
  artifactName: "VeilBrowse-${version}.AppImage"
